name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift version
        run: swift --version

      - name: Build package
        run: swift build

      - name: Build macOS app product
        run: swift build --product FlowerDoroMac

      - name: Prepare macOS app bundle
        run: |
          app_path="$(scripts/prepare-macos-app.sh debug)"
          test -f "$app_path/Contents/Resources/FlowerDoro.icns"
          test "$(plutil -extract CFBundleIconFile raw "$app_path/Contents/Info.plist")" = "FlowerDoro"

      - name: Run tests
        run: swift test
